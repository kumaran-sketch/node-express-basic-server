version: "3.8"

services:
  app:
    image: kumaran190/node-express-basic-server:latest
    container_name: docker_test_app
    expose:
      - "3000"
    env_file:
      - .env
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: docker_test_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
    networks:
      - app-network

networks:
  app-network: